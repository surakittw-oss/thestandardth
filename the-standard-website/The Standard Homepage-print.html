<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THE STANDARD — Homepage (Print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Serif+Thai:wght@400;500;600;700;900&family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,700;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=9" />
<style>
  /* ===== PRINT-READY OVERRIDES ===== */
  @page { size: A4 portrait; margin: 1cm; }
  html, body {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  /* De-stick the header so it doesn't repeat / float */
  .site-header { position: static !important; box-shadow: none !important; }
  /* Kill all motion */
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }
  /* Static ticker: show first items, no scroll */
  .ticker-track { mask-image: none !important; }
  .ticker-marquee { transform: none !important; padding-left: 0 !important; }
  /* Hide interactive-only chrome */
  .menu-btn, .icon-btn, .search-btn, .tweaks-panel { display: none !important; }

  @media print {
    body { background: #fff !important; }
    /* keep cards/sections from splitting awkwardly */
    .art-card, .bento-card, .bento-cell,
    .hero-minimal-card, .hero-minimal-feature,
    .hero-side-card, .hero-side-card-mag,
    .hero-minimal-item { break-inside: avoid; }
    .section { break-inside: auto; }
    .section-head, .footer-inner { break-inside: avoid; }
    .site-footer { break-before: auto; }
    a { text-decoration: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js?v=4"></script>
<script type="text/babel" src="components.jsx?v=6"></script>

<script type="text/babel">
// Fixed, deterministic state for print: minimal layout, light theme.
const PRINT_VARIANT = 'minimal';
const PRINT_DARK = false;

function App() {
  const variant = PRINT_VARIANT;
  const dark = PRINT_DARK;
  const activeCat = 'ALL';

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  }, [dark]);

  const filteredArticles = window.ARTICLES;
  const heroPool = window.ARTICLES;

  return (
    <div data-screen-label="Homepage">
      <Header dark={dark} setDark={() => {}} activeCat={activeCat} setActiveCat={() => {}} variant={variant} />
      <Ticker />
      <main>
        <Hero articles={heroPool} variant={variant} />
        <LatestGrid articles={filteredArticles} activeCat={activeCat} variant={variant} />
      </main>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Auto-print once fonts + images are ready
(function () {
  function waitForImages() {
    const bgEls = [...document.querySelectorAll('[style*="background-image"]')];
    const urls = bgEls.map(el => {
      const m = /url\(["']?(.*?)["']?\)/.exec(el.getAttribute('style') || '');
      return m && m[1];
    }).filter(Boolean);
    return Promise.all(urls.map(src => new Promise(res => {
      const img = new Image();
      img.onload = img.onerror = res;
      img.src = src;
    })));
  }
  function ready() {
    const fontsReady = document.fonts ? document.fonts.ready : Promise.resolve();
    Promise.all([fontsReady, waitForImages()]).then(() => {
      setTimeout(() => window.print(), 700);
    });
  }
  // wait for React render to populate the DOM
  let tries = 0;
  const iv = setInterval(() => {
    tries++;
    if (document.querySelector('.hero-minimal-feature') || tries > 40) {
      clearInterval(iv);
      ready();
    }
  }, 150);
})();
</script>
</body>
</html>
